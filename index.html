<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>geeker.world</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background:
        radial-gradient(circle at 20% 20%, #ff00ff, transparent 40%),
        radial-gradient(circle at 80% 30%, #00ffff, transparent 40%),
        radial-gradient(circle at 50% 80%, #39ff14, transparent 40%);
    filter: blur(90px);
    animation: move 6s infinite alternate;
}

@keyframes move {
    0% { transform: translate(-10%, -10%) scale(1); }
    100% { transform: translate(-5%, -5%) scale(1.2); }
}

/* MAIN DISPLAY */
#mainMedia {
    max-width: 85vw;
    max-height: 85vh;
    border-radius: 20px;
    z-index: 5;
    cursor: pointer;
    box-shadow: 0 0 60px #ff00ff;
}

/* FLOATING */
.chaos {
    position: fixed;
    width: 120px;
    pointer-events: none;
    animation: float linear forwards;
    z-index: 3;
}

@keyframes float {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(-30vh) rotate(720deg); opacity: 0; }
}

/* BURST */
.burst {
    position: fixed;
    width: 80px;
    pointer-events: none;
    animation: burst 1s forwards;
    z-index: 999;
}

@keyframes burst {
    to {
        transform: translate(var(--x), var(--y)) scale(1.3) rotate(720deg);
        opacity: 0;
    }
}

/* CORNER */
#corner {
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 180px;
    z-index: 9999;
}
</style>
</head>

<body>

<div id="mainContainer"></div>

<img id="corner" src="https://i.imgur.com/WLcWJA0.png">

<script>
const media = [
    "https://i.imgur.com/SnKKkNU.png",
    "https://i.imgur.com/m7oPaVQ.png",
    "https://i.imgur.com/aAQdrG7.png",

    "https://i.imgur.com/KgqP1tt.jpeg",
    "https://i.imgur.com/7GbsQG2.jpeg",
    "https://i.imgur.com/Esx2nYF.png",

    "https://i.imgur.com/2nY8uOg.mp4",
    "https://i.imgur.com/lQi51Js.mp4"
];

let index = 0;
const container = document.getElementById("mainContainer");

function createMedia(src, main=false) {
    let el;

    if (src.endsWith(".mp4")) {
        el = document.createElement("video");
        el.src = src;
        el.autoplay = true;
        el.loop = true;
        el.muted = true;
    } else {
        el = document.createElement("img");
        el.src = src;
    }

    if (main) {
        el.id = "mainMedia";
        el.onclick = next;
    } else {
        el.className = "chaos";
        el.style.left = Math.random()*100 + "vw";
        el.style.width = (60 + Math.random()*120) + "px";
        el.style.animationDuration = (4 + Math.random()*4) + "s";

        setTimeout(() => el.remove(), 8000);
    }

    return el;
}

function renderMain() {
    container.innerHTML = "";
    container.appendChild(createMedia(media[index], true));
}

function next() {
    index = (index + 1) % media.length;
    renderMain();
}

renderMain();

/* FLOATING CHAOS */
setInterval(() => {
    const el = createMedia(media[Math.floor(Math.random()*media.length)]);
    document.body.appendChild(el);
}, 400);

/* CLICK BURST */
document.addEventListener("click", e => {
    for (let i=0;i<8;i++) {
        const b = createMedia(media[Math.floor(Math.random()*media.length)]);
        b.className = "burst";

        const angle = Math.random()*Math.PI*2;
        const dist = 100 + Math.random()*200;

        b.style.left = e.clientX + "px";
        b.style.top = e.clientY + "px";
        b.style.setProperty("--x", Math.cos(angle)*dist + "px");
        b.style.setProperty("--y", Math.sin(angle)*dist + "px");

        document.body.appendChild(b);
        setTimeout(() => b.remove(), 1000);
    }
});
</script>

</body>
</html>
