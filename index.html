<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>geeker.world</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: black;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* TRIPPY BACKGROUND */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 20% 20%, #ff00ff, transparent 40%),
                radial-gradient(circle at 80% 30%, #00ffff, transparent 40%),
                radial-gradient(circle at 50% 80%, #39ff14, transparent 40%);
    filter: blur(90px);
    animation: move 6s infinite alternate;
    z-index: 0;
}

@keyframes move {
    0% { transform: translate(-10%, -10%) scale(1); }
    100% { transform: translate(-5%, -5%) scale(1.2); }
}

/* MAIN IMAGE */
#mainImg {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 20px;
    cursor: pointer;
    z-index: 1;
    position: relative;
    box-shadow: 0 0 60px rgba(255, 0, 255, 0.6),
                0 0 100px rgba(0, 255, 255, 0.4);
    transition: transform 0.2s ease, opacity 0.2s ease;
}

#mainImg:active {
    transform: scale(0.98);
}

/* BOTTOM RIGHT IMAGE */
.corner-img {
    position: fixed;
    bottom: 15px;
    right: 15px;
    width: 120px;
    z-index: 999;
    pointer-events: none;
    filter: drop-shadow(0 0 15px #ff00ff);
    animation: floaty 3s ease-in-out infinite;
}

@keyframes floaty {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<!-- MAIN CLICK IMAGE -->
<img id="mainImg" src="https://i.imgur.com/SnKKkNU.png" />

<!-- BOTTOM RIGHT IMAGE -->
<img src="https://i.imgur.com/WLcWJA0.png" class="corner-img">

<script>
const images = [
    "https://i.imgur.com/SnKKkNU.png",
    "https://i.imgur.com/m7oPaVQ.png",
    "https://i.imgur.com/aAQdrG7.png"
];

let index = 0;
const img = document.getElementById("mainImg");

img.onclick = () => {
    index = (index + 1) % images.length;
    img.style.opacity = 0;

    setTimeout(() => {
        img.src = images[index];
        img.style.opacity = 1;
    }, 150);
};
</script>

</body>
</html>
