<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>geeker.world</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: black;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: crosshair;
}

/* TRIPPY BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 220%;
    height: 220%;
    background:
        radial-gradient(circle at 20% 20%, #ff00ff, transparent 35%),
        radial-gradient(circle at 80% 30%, #00ffff, transparent 35%),
        radial-gradient(circle at 50% 80%, #39ff14, transparent 35%),
        radial-gradient(circle at 10% 90%, #ff0000, transparent 30%);
    filter: blur(90px) saturate(2);
    animation: bgMove 5s infinite alternate;
    z-index: 0;
}

@keyframes bgMove {
    0% { transform: translate(-12%, -12%) scale(1) rotate(0deg); }
    100% { transform: translate(-5%, -5%) scale(1.25) rotate(20deg); }
}

/* MAIN IMAGE */
#mainImg {
    max-width: 88vw;
    max-height: 88vh;
    border-radius: 22px;
    cursor: pointer;
    position: relative;
    z-index: 5;
    box-shadow:
        0 0 60px rgba(255, 0, 255, 0.8),
        0 0 120px rgba(0, 255, 255, 0.6);
    transition: opacity 0.18s ease, transform 0.18s ease, filter 0.18s ease;
}

#mainImg:hover {
    filter: hue-rotate(90deg) saturate(1.5);
}

#cornerImg {
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 200px;
    z-index: 9999;
    pointer-events: none;
    filter: drop-shadow(0 0 25px #ff00ff);
    animation: floaty 2.5s ease-in-out infinite;
}

@keyframes floaty {
    0% { transform: translateY(0px) rotate(-2deg); }
    50% { transform: translateY(-12px) rotate(3deg); }
    100% { transform: translateY(0px) rotate(-2deg); }
}

/* FLOATING CHAOS IMAGES */
.chaos-img {
    position: fixed;
    width: 120px;
    z-index: 3;
    pointer-events: none;
    filter: drop-shadow(0 0 18px white);
    animation: fly linear forwards;
}

@keyframes fly {
    0% {
        transform: translateY(110vh) rotate(0deg) scale(0.7);
        opacity: 0;
    }
    10% { opacity: 1; }
    100% {
        transform: translateY(-30vh) rotate(900deg) scale(1.4);
        opacity: 0;
    }
}

/* CLICK EXPLOSIONS */
.burst {
    position: fixed;
    width: 90px;
    z-index: 999;
    pointer-events: none;
    animation: burst 900ms ease-out forwards;
    filter: drop-shadow(0 0 18px #00ffff);
}

@keyframes burst {
    0% {
        transform: translate(-50%, -50%) scale(0.4) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translate(var(--x), var(--y)) scale(1.3) rotate(720deg);
        opacity: 0;
    }
}

/* CURSOR TRAIL */
.trail {
    position: fixed;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: white;
    z-index: 99999;
    pointer-events: none;
    box-shadow: 0 0 12px #ff00ff, 0 0 24px #00ffff;
    animation: trailFade 600ms linear forwards;
}

@keyframes trailFade {
    to {
        transform: scale(0);
        opacity: 0;
    }
}

/* SHAKE */
.shake {
    animation: shake 180ms linear;
}

@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(8px,-6px); }
    50% { transform: translate(-7px,7px); }
    75% { transform: translate(6px,4px); }
    100% { transform: translate(0,0); }
}

/* MODE TEXT */
#modeText {
    position: fixed;
    top: 18px;
    left: 18px;
    color: white;
    font-family: Arial, sans-serif;
    font-weight: bold;
    z-index: 10000;
    text-shadow: 0 0 15px #ff00ff;
}
</style>
</head>

<body>

<div id="modeText">geeker.world</div>

<img id="mainImg" src="https://i.imgur.com/SnKKkNU.png">
<img id="cornerImg" src="https://i.imgur.com/WLcWJA0.png">

<script>
const mainImages = [
    "https://i.imgur.com/SnKKkNU.png",
    "https://i.imgur.com/m7oPaVQ.png",
    "https://i.imgur.com/aAQdrG7.png"
];

const allImages = [
    "https://i.imgur.com/SnKKkNU.png",
    "https://i.imgur.com/m7oPaVQ.png",
    "https://i.imgur.com/aAQdrG7.png",
    "https://i.imgur.com/WLcWJA0.png"
];

let index = 0;
let mode = "all";
let chaosSpeed = 650;

const img = document.getElementById("mainImg");
const modeText = document.getElementById("modeText");

img.onclick = () => {
    index = (index + 1) % mainImages.length;
    img.style.opacity = 0;
    img.style.transform = "scale(1.08) rotate(2deg)";

    setTimeout(() => {
        img.src = mainImages[index];
        img.style.opacity = 1;
        img.style.transform = "scale(1) rotate(0deg)";
    }, 150);
};

function randomImage() {
    return allImages[Math.floor(Math.random() * allImages.length)];
}

function spawnFloating() {
    const floating = document.createElement("img");
    floating.className = "chaos-img";
    floating.src = randomImage();

    floating.style.left = Math.random() * 100 + "vw";
    floating.style.width = (60 + Math.random() * 150) + "px";
    floating.style.animationDuration = (4 + Math.random() * 4) + "s";

    document.body.appendChild(floating);
    setTimeout(() => floating.remove(), 9000);
}

let floatingLoop = setInterval(spawnFloating, chaosSpeed);

function restartChaos() {
    clearInterval(floatingLoop);
    floatingLoop = setInterval(spawnFloating, chaosSpeed);
}

document.addEventListener("mousemove", e => {
    const dot = document.createElement("div");
    dot.className = "trail";
    dot.style.left = e.clientX + "px";
    dot.style.top = e.clientY + "px";
    document.body.appendChild(dot);
    setTimeout(() => dot.remove(), 600);
});

document.addEventListener("click", e => {
    document.body.classList.remove("shake");
    void document.body.offsetWidth;
    document.body.classList.add("shake");

    for (let i = 0; i < 10; i++) {
        const b = document.createElement("img");
        b.className = "burst";
        b.src = randomImage();

        b.style.left = e.clientX + "px";
        b.style.top = e.clientY + "px";

        const angle = Math.random() * Math.PI * 2;
        const distance = 100 + Math.random() * 220;

        b.style.setProperty("--x", Math.cos(angle) * distance + "px");
        b.style.setProperty("--y", Math.sin(angle) * distance + "px");

        document.body.appendChild(b);
        setTimeout(() => b.remove(), 1000);
    }
});

document.addEventListener("keydown", e => {
    const key = e.key.toLowerCase();

    if (key === "g") {
        mode = "GIGA CHAOS";
        chaosSpeed = 120;
        document.body.style.filter = "saturate(2) contrast(1.2)";
        restartChaos();
    }

    if (key === "c") {
        mode = "CAT MODE";
        chaosSpeed = 300;
        restartChaos();
    }

    if (key === "v") {
        mode = "VAPE MODE";
        chaosSpeed = 300;
        restartChaos();
    }

    modeText.innerText = "geeker.world // " + mode;
});
</script>

</body>
</html>
