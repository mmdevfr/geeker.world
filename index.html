<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>geeker.world</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
}

/* 🎥 BACKGROUND VIDEO */
#bgVideo {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    filter: blur(2px) brightness(0.5) saturate(1.6);
}

/* 🌈 TRIPPY OVERLAY */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 20% 20%, #ff00ff, transparent 40%),
                radial-gradient(circle at 80% 30%, #00ffff, transparent 40%),
                radial-gradient(circle at 50% 80%, #39ff14, transparent 40%);
    filter: blur(90px);
    z-index: -1;
    opacity: 0.6;
}

/* 🖼 MAIN IMAGE */
#mainImg {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 0 60px rgba(255,0,255,0.6);
    transition: 0.2s;
}

/* 📍 CORNER IMAGE */
#cornerImg {
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 180px;
    cursor: pointer;
    transition: 0.3s;
}
#cornerImg.enlarged {
    transform: scale(1.2);
}

/* 💬 CHAT */
#chatBox {
    position: fixed;
    left: 10px;
    bottom: 10px;
    width: 300px;
    height: 320px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #ff00ff;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    z-index: 9999;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    color: white;
    font-family: monospace;
    font-size: 13px;
}

#usernameInput, #msgInput {
    border: none;
    padding: 8px;
    outline: none;
    background: black;
    color: white;
    border-top: 1px solid #ff00ff;
}

/* 🔵 DISCORD BUTTON */
#discordBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9999;
    padding: 10px;
    background: #5865F2;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video id="bgVideo" autoplay muted loop>
    <source src="https://i.imgur.com/o9OTxU1.mp4">
</video>

<!-- 🖼 IMAGES -->
<img id="mainImg" src="https://i.imgur.com/SnKKkNU.png">
<img id="cornerImg" src="https://i.imgur.com/Hq3TZcr.png">

<!-- 🔵 DISCORD -->
<button id="discordBtn">Join Discord</button>

<!-- 💬 CHAT -->
<div id="chatBox">
    <input id="usernameInput" placeholder="username..." />
    <div id="messages"></div>
    <input id="msgInput" placeholder="message..." />
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔑 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  projectId: "PASTE_HERE",
  storageBucket: "PASTE_HERE",
  messagingSenderId: "PASTE_HERE",
  appId: "PASTE_HERE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 💬 CHAT ELEMENTS */
const usernameInput = document.getElementById("usernameInput");
const input = document.getElementById("msgInput");
const messagesDiv = document.getElementById("messages");

/* ✅ VERIFIED USERS */
const verifiedUsers = ["admin", "owner"];

/* 🔵 DISCORD SYSTEM */
let isDiscordMember = localStorage.getItem("discordMember") === "true";

/* 🔥 COOLDOWN */
let lastMsg = 0;

function cooldown() {
    return isDiscordMember ? 2000 : 5000;
}

/* 🔵 DISCORD BUTTON */
document.getElementById("discordBtn").onclick = () => {
    window.open("https://discord.gg/GjyFxq5wqN", "_blank");
    localStorage.setItem("discordMember", "true");
    isDiscordMember = true;
    alert("Verified Discord Member: 2s cooldown unlocked!");
};

/* 💬 LIVE CHAT */
const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
    messagesDiv.innerHTML = "";

    snapshot.forEach(doc => {
        const d = doc.data();

        const isVerified = verifiedUsers.includes(d.user);
        const isDiscord = isDiscordMember && d.user === usernameInput.value;

        const div = document.createElement("div");

        div.innerHTML = `
            ${isVerified ? "✅" : ""}
            ${isDiscord ? "🔵" : ""}
            <b>${d.user}</b>: ${d.text}
        `;

        messagesDiv.appendChild(div);
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

/* 📤 SEND MESSAGE */
input.addEventListener("keypress", async (e) => {
    if (e.key !== "Enter") return;
    if (input.value.trim() === "") return;

    const now = Date.now();
    if (now - lastMsg < cooldown()) return;

    const user = usernameInput.value.trim() || "anon";

    await addDoc(collection(db, "messages"), {
        user,
        text: input.value,
        time: Date.now()
    });

    lastMsg = now;
    input.value = "";
});

/* 🖼 IMAGE SWITCH */
const imgs = [
 "https://i.imgur.com/SnKKkNU.png",
 "https://i.imgur.com/m7oPaVQ.png",
 "https://i.imgur.com/aAQdrG7.png"
];

let i = 0;
document.getElementById("mainImg").onclick = () => {
    i = (i + 1) % imgs.length;
    const img = document.getElementById("mainImg");
    img.style.opacity = 0;
    setTimeout(() => {
        img.src = imgs[i];
        img.style.opacity = 1;
    }, 150);
};

/* 📍 CORNER ZOOM */
document.getElementById("cornerImg").onclick = () => {
    document.getElementById("cornerImg").classList.toggle("enlarged");
};
</script>

</body>
</html>
