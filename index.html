<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>geeker.world</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
}

/* 🎥 BACKGROUND VIDEO */
#bgVideo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    filter: blur(2px) brightness(0.5) saturate(1.6);
}

/* TRIPPY OVERLAY */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 20% 20%, #ff00ff, transparent 40%),
                radial-gradient(circle at 80% 30%, #00ffff, transparent 40%),
                radial-gradient(circle at 50% 80%, #39ff14, transparent 40%);
    filter: blur(90px);
    animation: move 6s infinite alternate;
    z-index: -1;
    opacity: 0.6;
}

@keyframes move {
    0% { transform: translate(-10%, -10%) scale(1); }
    100% { transform: translate(-5%, -5%) scale(1.2); }
}

/* MAIN IMAGE */
#mainImg {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 20px;
    cursor: pointer;
    z-index: 2;
    box-shadow: 0 0 60px rgba(255, 0, 255, 0.6),
                0 0 100px rgba(0, 255, 255, 0.4);
    transition: opacity 0.2s ease, transform 0.2s ease;
}

#mainImg:active {
    transform: scale(0.98);
}

/* BOTTOM RIGHT IMAGE */
#cornerImg {
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 200px;
    z-index: 9999;
    cursor: pointer;
    filter: drop-shadow(0 0 20px #ff00ff);
    transition: transform 0.3s ease;
    transform-origin: bottom right;
    animation: floaty 3s ease-in-out infinite;
}

#cornerImg.enlarged {
    transform: scale(1.25);
    animation: none;
}

@keyframes floaty {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

/* MUSIC BUTTON */
#musicBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9999;

    padding: 10px 15px;
    border-radius: 10px;
    border: 1px solid #ff00ff;

    background: rgba(255, 0, 255, 0.2);
    color: white;
    cursor: pointer;

    backdrop-filter: blur(10px);
    transition: 0.2s;
}

#musicBtn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #ff00ff;
}
</style>
</head>

<body>

<!-- 🎥 BACKGROUND VIDEO (YOUR LINK) -->
<video id="bgVideo" autoplay muted loop>
    <source src="https://i.imgur.com/o9OTxU1.mp4" type="video/mp4">
</video>

<!-- 🎵 OPTIONAL AUDIO (same file) -->
<audio id="music" loop>
    <source src="https://i.imgur.com/o9OTxU1.mp4" type="audio/mp4">
</audio>

<button id="musicBtn">▶ Play Music</button>

<!-- MAIN IMAGE -->
<img id="mainImg" src="https://i.imgur.com/SnKKkNU.png">

<!-- BOTTOM RIGHT IMAGE -->
<img id="cornerImg" src="https://i.imgur.com/Hq3TZcr.png">

<script>
/* IMAGE SWITCHER */
const images = [
    "https://i.imgur.com/SnKKkNU.png",
    "https://i.imgur.com/m7oPaVQ.png",
    "https://i.imgur.com/aAQdrG7.png"
];

let index = 0;
const img = document.getElementById("mainImg");

img.onclick = () => {
    index = (index + 1) % images.length;
    img.style.opacity = 0;

    setTimeout(() => {
        img.src = images[index];
        img.style.opacity = 1;
    }, 150);
};

/* CORNER ZOOM */
const cornerImg = document.getElementById("cornerImg");

cornerImg.onclick = () => {
    cornerImg.classList.toggle("enlarged");
};

/* MUSIC TOGGLE */
const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");

let playing = false;

btn.onclick = () => {
    if (!playing) {
        music.play();
        btn.innerText = "⏸ Pause Music";
    } else {
        music.pause();
        btn.innerText = "▶ Play Music";
    }
    playing = !playing;
};
</script>

</body>
</html>
